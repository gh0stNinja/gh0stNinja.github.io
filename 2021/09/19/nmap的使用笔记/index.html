            <h1 id="seo-header">nmap的使用方法</h1>
            
            
              <div class="markdown-body">
                
                <h4 id="1、常用命令"><a href="#1、常用命令" class="headerlink" title="1、常用命令"></a>1、常用命令</h4><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br></pre></td><td class="code"><pre><code class="hljs bash"><span class="hljs-comment"># 批量资产扫描</span><br><span class="hljs-built_in">nohup</span> nmap  -sT  -iL ip.txt -PN -p- --min-rate 2000 -oX result.xml &amp;	<br><span class="hljs-comment"># 扫描单个目标</span><br>nmap 192.168.1.100<br><span class="hljs-comment"># 扫描多个目标</span><br>nmao 192.168.1.100 192.168.1.111 192.168.2.8<br>nmap 192.168.1.100,111,115,127<br>nmap 192.168.1.100-200<br><span class="hljs-comment"># 扫描一个网段</span><br>nmap 192.168.1.0/24<br>nmap 192.168.0.0/16<br><span class="hljs-comment"># -A 参数将大多数有用的扫描命令集成在一起使用</span><br>nmap -A 192.168.1.100<br><span class="hljs-comment"># -O 参数获取目标的系统版本</span><br>nmap -O 192.168.1.100<br><span class="hljs-comment"># -PN 跳过ping尝试，对目标进行深度扫描(-PN 和 -P0 是一样的)</span><br>nmap -PN 192.168.1.111<br><span class="hljs-comment"># -sn 探测存活主机</span><br>nmap -sn 192.168.1.1/24<br><span class="hljs-comment"># -p 扫描指定端口</span><br>nmap -p 80,443,135,445 192.168.1.100<br>nmap -p  192.168.1.100 		<span class="hljs-comment"># 扫描80-1000之间的端口</span><br>nmap -p- 192.168.1.100 			<span class="hljs-comment"># 扫描1-65535所有的端口</span><br><span class="hljs-comment"># 使用ping扫描</span><br>nmap -sP 192.168.1.100<br><span class="hljs-comment"># 使用TCP扫描</span><br>nmap -sT 192.168.1.100<br><span class="hljs-comment"># 使用UDP扫描</span><br>nmap -sU 192.168.1.100<br><span class="hljs-comment"># 使用SYN半开放扫描</span><br>nmap -sS 192.168.1.100<br><span class="hljs-comment"># 使用ACK扫描</span><br>nmap -PA 192.1_6_8.1.120<br><span class="hljs-comment"># 使用文本扫描</span><br>nmap -iL ip.txt<br></code></pre></td></tr></table></figure>

<h4 id="2、时间选项"><a href="#2、时间选项" class="headerlink" title="2、时间选项"></a>2、时间选项</h4><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br></pre></td><td class="code"><pre><code class="hljs bash"><span class="hljs-comment"># 探测报文延迟时间(-T0 ~ -T5)数值越大越快,延迟时间可以提高扫描的精确度</span><br>nmap -T4 192.168.1.100<br>&lt;--<br>    -T0  偏执的：非常非常慢，用于IDS逃逸<br>    -T1  猥琐的：相当慢，用于IDS逃逸<br>    -T2  有礼貌的：降低速度以消耗更小的带宽，比默认慢十倍<br>    -T3  普通的：默认，根据目标的反应自动调整时间模式<br>    -T4  野蛮的：假定处在一个很好的网络环境，请求可能会淹没目标<br>    -T5  疯狂的：非常野蛮，很可能会淹没目标端口或是漏掉一些开放端口<br>--&gt;<br><span class="hljs-comment"># TTL（存活时间）是因特网协议（IP）报文分组中的一个值</span><br>nmap -ttl 100 192.168.1.100<br><span class="hljs-comment"># 设置timeout时间</span><br>nmap --host-timeout 1m 192.168.1.100<br><span class="hljs-comment"># 指针延迟,可以提高准确度</span><br>nmap --scan-delay 10s 192.168.1.100<br><span class="hljs-comment"># 设置每秒最低50个数据包发送量,太高扫描结果可能不准确</span><br>nmap --min-rate 50 192.168.1.100<br><span class="hljs-comment"># 设置每秒最大10个数据包发送量</span><br>nmap --max-rate 10 192.168.1.100<br></code></pre></td></tr></table></figure>

<h4 id="3、绕过防火墙"><a href="#3、绕过防火墙" class="headerlink" title="3、绕过防火墙"></a>3、绕过防火墙</h4><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br></pre></td><td class="code"><pre><code class="hljs bash"><span class="hljs-comment"># 绕过防火墙</span><br>nmap -f 192.168.1.111<br><span class="hljs-comment"># 使用ETH,这个命令会发送小于8字节的探针,而不是整个包</span><br>nmap eta ETH 192.1_6_8.1.100<br><span class="hljs-comment"># 指定最大传输单位(字节),可以是8的任何倍数(16,32,64)</span><br>nmap --mtu 8 192.168.1.100<br><span class="hljs-comment"># 使用诱饵选项,使用许多伪装的ip地址</span><br>nmap -D RND:10 192.168.1.100<br><span class="hljs-comment"># 使用伪装ip地址进行扫描,支持伪装多个ip地址</span><br>nmap -D 10.10.1.111 192.168.1.100<br><span class="hljs-comment"># 指定端口进行扫描</span><br>nmap --source-port 88 192.168.1.100<br><span class="hljs-comment"># 根据特定的目标，在发送的数据包中加入一些随机的数据</span><br>nmap --data-length 25 192.168.1.100<br><span class="hljs-comment"># 给目标发送一些不正确的检测信息</span><br>nmap --badsum 192.168.1.111<br></code></pre></td></tr></table></figure>

<h4 id="4、输出文件"><a href="#4、输出文件" class="headerlink" title="4、输出文件"></a>4、输出文件</h4><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br></pre></td><td class="code"><pre><code class="hljs bash"><span class="hljs-comment"># -oN 参数标准输出</span><br>nmap -oN scan.txt 192.168.1.1/24<br><span class="hljs-comment"># -oX 参数输出xml文件</span><br>nmap -oX scan.xml 192.168.1.1/24<br><span class="hljs-comment"># -oG 参数输出文件,适合用grep查看</span><br>nmap -oG scan.txt192.168.1.1/24<br><span class="hljs-comment"># -oA 参数输出以上所有格式文件</span><br>nmap -oA scan 192.168.1.1/24<br></code></pre></td></tr></table></figure>

<h4 id="5、脚本"><a href="#5、脚本" class="headerlink" title="5、脚本"></a>5、脚本</h4><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br></pre></td><td class="code"><pre><code class="hljs bash"><span class="hljs-comment"># 扫描常规漏洞（根据nmap版本而定）</span><br>nmap --script=vuln 192.168.1.100<br><span class="hljs-comment"># 扫描root空口令</span><br>nmap -p 3306 --script=mysql-empty-password.nse 192.168.1.100<br><span class="hljs-comment"># telnet暴力破解</span><br>nmap -p 23 --script telnet-brute --script-args userdb=[用户名字典路径],passdb=[密码字典路径] --script-args telnet-brute.timeout=8s 192.168.1.100<br><span class="hljs-comment"># 检测robots.txt文件中的内容</span><br>nmap --script=http-robots.txt.nse www.baidu.com<br><span class="hljs-comment"># 执行dos攻击</span><br>nmap --script http-slowloris --max-parallelism 1000 www.baidu.com<br><span class="hljs-comment"># 劫持banner信息</span><br>nmap --script banner 192.168.1.100<br><span class="hljs-comment"># 使用所有http开头的脚步进行扫描</span><br>nmap --script <span class="hljs-string">&quot;http*&quot;</span> www.baidu.com<br><span class="hljs-comment"># 默认的脚本扫描,主要是搜集各种应用服务的信息,收集到后,可再针对具体服务进行攻击</span><br>nmap --script default 192.168.1.100<br>nmap -sC 192.168.1.100  简化写法<br><span class="hljs-comment"># 升级数据库</span><br>nmap --script-updatedb<br>......<br></code></pre></td></tr></table></figure>

<script>
  Fluid.utils.createScript('https://lib.baomitu.com/tocbot/4.20.1/tocbot.min.js', function() {
    var toc = jQuery('#toc');
    if (toc.length === 0 || !window.tocbot) { return; }
    var boardCtn = jQuery('#board-ctn');
    var boardTop = boardCtn.offset().top;

    window.tocbot.init(Object.assign({
      tocSelector     : '#toc-body',
      contentSelector : '.markdown-body',
      linkClass       : 'tocbot-link',
      activeLinkClass : 'tocbot-active-link',
      listClass       : 'tocbot-list',
      isCollapsedClass: 'tocbot-is-collapsed',
      collapsibleClass: 'tocbot-is-collapsible',
      scrollSmooth    : true,
      includeTitleTags: true,
      headingsOffset  : -boardTop,
    }, CONFIG.toc));
    if (toc.find('.toc-list-item').length > 0) {
      toc.css('visibility', 'visible');
    }

    Fluid.events.registerRefreshCallback(function() {
      if ('tocbot' in window) {
        tocbot.refresh();
        var toc = jQuery('#toc');
        if (toc.length === 0 || !tocbot) {
          return;
        }
        if (toc.find('.toc-list-item').length > 0) {
          toc.css('visibility', 'visible');
        }
      }
    });
  });
</script>

<script>
  Fluid.utils.createScript('https://lib.baomitu.com/anchor-js/4.3.1/anchor.min.js', function() {
    window.anchors.options = {
      placement: CONFIG.anchorjs.placement,
      visible  : CONFIG.anchorjs.visible
    };
    if (CONFIG.anchorjs.icon) {
      window.anchors.options.icon = CONFIG.anchorjs.icon;
    }
    var el = (CONFIG.anchorjs.element || 'h1,h2,h3,h4,h5,h6').split(',');
    var res = [];
    for (var item of el) {
      res.push('.markdown-body > ' + item.trim());
    }
    if (CONFIG.anchorjs.placement === 'left') {
      window.anchors.options.class = 'anchorjs-link-left';
    }
    window.anchors.add(res.join(', '));

    Fluid.events.registerRefreshCallback(function() {
      if ('anchors' in window) {
        anchors.removeAll();
        var el = (CONFIG.anchorjs.element || 'h1,h2,h3,h4,h5,h6').split(',');
        var res = [];
        for (var item of el) {
          res.push('.markdown-body > ' + item.trim());
        }
        if (CONFIG.anchorjs.placement === 'left') {
          anchors.options.class = 'anchorjs-link-left';
        }
        anchors.add(res.join(', '));
      }
    });
  });
</script>
